<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register - ShopEZ</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body class="d-flex flex-column justify-content-center align-items-center" style="min-height:100vh; background:#f5f5f5;">

<div class="card p-4 shadow" style="width:350px;">
  <h2 class="text-center mb-3">Register</h2>
  <form id="registerForm">
    <div class="mb-3">
      <label for="regName" class="form-label">Name</label>
      <input type="text" id="regName" class="form-control"
         required minlength="3" maxlength="20" pattern="[A-Za-z ]+">
    </div>
    <div class="mb-3">
      <label for="regEmail" class="form-label">Email</label>
      <input type="email" id="regEmail" class="form-control" required>
    </div>
    <div class="mb-3">
      <label for="regPassword" class="form-label">Password</label>
      <input type="password" id="regPassword" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-success w-100">Register</button>
    <p class="mt-2 text-center">Already have an account? <a href="login.html">Login</a></p>
  </form>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
$("#registerForm").submit(function(e){
  e.preventDefault();
  const name = $("#regName").val();
  const email = $("#regEmail").val();
  const password = $("#regPassword").val();

  let users = JSON.parse(localStorage.getItem("users")) || [];
  users.push({name,email,password});
  localStorage.setItem("users", JSON.stringify(users));

  localStorage.setItem("currentUser", JSON.stringify({name,email}));


  window.location.href = "index.html";
});
</script>
</body>
</html>
