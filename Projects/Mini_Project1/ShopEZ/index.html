<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ShopEZ - Home</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- Navbar -->
<div id="navbar"></div>
<h3 class="text-center fst-italic">ShopEZ</h3>
<p class="text-center fst-italic">Your favourite shopping for electronics & Fashion</p>
<!-- Carousel / Top Deals -->
<section class="container my-5">
  <h2 class="text-center mb-4">Top Deals</h2>
  <div id="carouselProducts" class="carousel slide" data-bs-ride="carousel" data-bs-interval="2000">
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="images/laptop.jpg" class="d-block w-100" alt="Product 1">
    </div>
    <div class="carousel-item">
      <img src="images/mobile.jpg" class="d-block w-100" alt="Product 2">
    </div>
    <div class="carousel-item">
      <img src="images/bag.jpg" class="d-block w-100" alt="Product 3">
    </div>
  </div>
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselProducts" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselProducts" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>
</div>

</section>

<!-- Search & Filter -->
<section class="container text-center my-5">
  <input type="text" id="search" class="form-control mb-3" placeholder="Search products">
  <div class="btn-group" role="group">
    <button class="btn btn-outline-dark active" onclick="filterCategory('')">All</button>
    <button class="btn btn-outline-dark" onclick="filterCategory('Electronics')">Electronics</button>
    <button class="btn btn-outline-dark" onclick="filterCategory('Fashion')">Fashion</button>
  </div>
</section>

<!-- Product Grid -->
<section class="container my-5">
  <div class="row" id="homeProducts"></div>
</section>

<footer>© ShopEZ 2026</footer>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/common.js"></script>
<script src="js/home.js"></script>
<script src="js/cart.js"></script>
</body>
</html>
