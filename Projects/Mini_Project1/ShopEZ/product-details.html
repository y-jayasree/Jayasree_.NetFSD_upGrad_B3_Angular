<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">

</head>

<body>

<div id="navbar"></div>

<div class="container mt-4">

<div id="details"></div>

<p id="msg" class="text-success mt-2"></p>

</div>

<div id="footer"></div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script src="js/common.js"></script>
<script src="js/cart.js"></script>

<script>
$(function () {

  let id = new URLSearchParams(window.location.search).get("id");

  $.getJSON("data/products.json", function (data) {

    let p = data.find(x => x.id == id);

    if (!p) {
      $("#details").html("<h4>Product not found</h4>");
      return;
    }

    $("#details").html(`
      <div class="row">
        <div class="col-md-6">
          <img src="${p.image}" class="img-fluid">
        </div>
        <div class="col-md-6">
          <h3>${p.name}</h3>
          <p>${p.description}</p>
          <h4>₹${p.price}</h4>

          <button class="btn btn-success" id="addBtn">Add to Cart</button>
        </div>
      </div>
    `);

    $("#addBtn").click(function () {
      addToCart(p);
      $("#msg").text("Added to cart");
    });

  });

});
</script>
<p id="msg" class="text-success"></p>

<script src="js/cart.js"></script>
</body>
</html>
