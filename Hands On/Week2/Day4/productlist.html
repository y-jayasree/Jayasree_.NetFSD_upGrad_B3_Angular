<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Electronics Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="bg-dark text-white text-center py-4">
    <h1 class="mb-0">Electronics Store</h1>
</div>
<div class="container py-5">
    
    <div class="row g-4">

    <div class="col-12 col-md-6 col-lg-3">
    <div class="card h-100 shadow-sm">
        <img src="https://images.unsplash.com/photo-1598327105666-5b89351aff97?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8c21hcnRwaG9uZXxlbnwwfHwwfHx8MA%3D%3D" 
             class="card-img-top" alt="Smartphone">
        <div class="card-body d-flex flex-column">
            <h5 class="card-title">Smartphone</h5>
            <p class="card-text">Latest 5G smartphone with powerful battery.</p>
            <h6 class="text-primary mb-3">₹25,000</h6>
            <div class="mt-auto">
                <button class="btn btn-primary w-100 mb-2">Add to Cart</button>
                <button class="btn btn-outline-secondary w-100">View Details</button>
            </div>
        </div>
    </div>
</div>


        <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100 shadow-sm">
                <img src="https://images.unsplash.com/photo-1484788984921-03950022c9ef?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTB8fGxhcHRvcHxlbnwwfHwwfHx8MA%3D%3D" class="card-img-top" alt="Product">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">Laptop</h5>
                    <p class="card-text">High-performance laptop for work & gaming.</p>
                    <h6 class="text-primary mb-3">₹65,000</h6>
                    <div class="mt-auto">
                        <button class="btn btn-primary w-100 mb-2">Add to Cart</button>
                        <button class="btn btn-outline-secondary w-100">View Details</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100 shadow-sm">
                <img src="https://plus.unsplash.com/premium_photo-1678099940967-73fe30680949?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NXx8aGVhZHBob25lc3xlbnwwfHwwfHx8MA%3D%3D" class="card-img-top" alt="Product">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">Headphones</h5>
                    <p class="card-text">Noise-cancelling wireless headphones.</p>
                    <h6 class="text-primary mb-3">₹5,000</h6>
                    <div class="mt-auto">
                        <button class="btn btn-primary w-100 mb-2">Add to Cart</button>
                        <button class="btn btn-outline-secondary w-100">View Details</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100 shadow-sm">
                <img src="https://images.unsplash.com/photo-1546868871-7041f2a55e12?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8c21hcnQlMjB3YXRjaHxlbnwwfHwwfHx8MA%3D%3D" class="card-img-top" alt="Product">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">Smart Watch</h5>
                    <p class="card-text">Fitness tracking with heart rate monitor.</p>
                    <h6 class="text-primary mb-3">₹8,000</h6>
                    <div class="mt-auto">
                        <button class="btn btn-primary w-100 mb-2">Add to Cart</button>
                        <button class="btn btn-outline-secondary w-100">View Details</button>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
