<!DOCTYPE html>
<html>
<head>
    <title>Location Logger</title>
</head>
<body>

<h2>Location Based Logger</h2>

<button onclick="getLocation()">Get My Location</button>

<p id="currentLocation"></p>

<h3>Location History (Last 5)</h3>
<ul id="historyList"></ul>

<script>

window.onload = function() {
    loadHistory();
};

function getLocation() {

    if (navigator.geolocation) {

        navigator.geolocation.getCurrentPosition(
            showPosition,
            showError,
            { timeout: 10000 }
        );

    } else {
        document.getElementById("currentLocation").innerHTML =
            "Geolocation is not supported by this browser.";
    }
}

function showPosition(position) {

    var latitude = position.coords.latitude;
    var longitude = position.coords.longitude;

    document.getElementById("currentLocation").innerHTML =
        "Latitude: " + latitude + "<br>Longitude: " + longitude;

    var locationObj = {
        lat: latitude,
        long: longitude,
        time: new Date().toLocaleString()
    };

    saveLocation(locationObj);
}

function showError(error) {

    if (error.code === 1) {
        document.getElementById("currentLocation").innerHTML =
            "Permission Denied by user.";
    }
    else if (error.code === 2) {
        document.getElementById("currentLocation").innerHTML =
            "Location information unavailable.";
    }
    else if (error.code === 3) {
        document.getElementById("currentLocation").innerHTML =
            "Request timed out.";
    }
    else {
        document.getElementById("currentLocation").innerHTML =
            "Unknown error occurred.";
    }
}

function saveLocation(newLocation) {

    var locations = localStorage.getItem("locationHistory");

    if (locations === null) {
        locations = [];
    } else {
        locations = JSON.parse(locations);
    }

    locations.push(newLocation);
    if (locations.length > 5) {
        locations.shift();
    }

    localStorage.setItem("locationHistory", JSON.stringify(locations));

    loadHistory();
}

function loadHistory() {

    var historyData = localStorage.getItem("locationHistory");

    if (historyData !== null) {

        var locations = JSON.parse(historyData);

        var list = document.getElementById("historyList");
        list.innerHTML = "";

        for (var i = 0; i < locations.length; i++) {

            var li = document.createElement("li");

            li.innerHTML =
                "Lat: " + locations[i].lat +
                " | Long: " + locations[i].long +
                " | Time: " + locations[i].time;

            list.appendChild(li);
        }
    }
}

</script>

</body>
</html>
