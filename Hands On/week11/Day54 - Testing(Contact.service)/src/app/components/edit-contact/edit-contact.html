<h2>Edit Contact</h2>

<input type="text" placeholder="Name" [(ngModel)]="contact.name"><br><br>
<input type="email" placeholder="Email" [(ngModel)]="contact.email"><br><br>
<input type="text" placeholder="Phone" [(ngModel)]="contact.phone"><br><br>

<button (click)="update()">Update</button>
<button (click)="cancel()">Cancel</button>
