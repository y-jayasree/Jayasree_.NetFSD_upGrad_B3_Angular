<!DOCTYPE html>
<html>
<head>
    <title>Weather App</title>
</head>
<body>

<input type="text" id="city" placeholder="Enter city">
<button id="btnPromise">Using Promise</button>
<button id="btnAsync">Using Async/Await</button>

<div id="result"></div>

<script>

const apiKey = "e141c68c4d7f10c9b99fabd796b4d426";
const result = document.getElementById("result");

const getWeatherPromise = () => {
    const city = document.getElementById("city").value;

    fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`)
        .then(res => {
            if (!res.ok) throw new Error("City not found");
            return res.json();
        })
        .then(data => displayWeather(data))
        .catch(err => result.innerHTML = `<p>${err.message}</p>`);
};
const getWeatherAsync = async () => {
    try {
        const city = document.getElementById("city").value;

        const res = await fetch(
            `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`
        );

        if (!res.ok) throw new Error("City not found");

        const data = await res.json();
        displayWeather(data);

    } catch (err) {
        result.innerHTML = `<p>${err.message}</p>`;
    }
};
const displayWeather = (data) => {
    result.innerHTML = `
        <h3>${data.name}</h3>
        <p>Temp: ${data.main.temp}°C</p>
        <p>Humidity: ${data.main.humidity}%</p>
        <p>Condition: ${data.weather[0].description}</p>
    `;
};
document.getElementById("btnPromise")
    .addEventListener("click", getWeatherPromise);

document.getElementById("btnAsync")
    .addEventListener("click", getWeatherAsync);

</script>

</body>
</html>
