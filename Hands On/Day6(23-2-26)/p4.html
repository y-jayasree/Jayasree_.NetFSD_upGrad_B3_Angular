<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker - IndexedDB</title>
</head>
<body>

<h2>Expense Tracker</h2>

Title:
<input type="text" id="title"><br><br>

Amount:
<input type="number" id="amount"><br><br>

Date:
<input type="date" id="date"><br><br>

<button onclick="addExpense()">Add Expense</button>
<button onclick="viewExpenses()">View Expenses</button>
<button onclick="deleteExpense()">Delete Expense</button>

<h3>Expense List</h3>
<ul id="expenseList"></ul>

<script>

var db;

var request = indexedDB.open("ExpenseDB", 1);

// Create object store
request.onupgradeneeded = function(event) {
    db = event.target.result;
    db.createObjectStore("expenses", { keyPath: "id", autoIncrement: true });
};

request.onsuccess = function(event) {
    db = event.target.result;
};

request.onerror = function(event) {
    alert("Database Error: " + event.target.errorCode);
};

// Add Expense
function addExpense() {

    var title = document.getElementById("title").value;
    var amount = document.getElementById("amount").value;
    var date = document.getElementById("date").value;

    var transaction = db.transaction(["expenses"], "readwrite");
    var store = transaction.objectStore("expenses");

    var expense = {
        title: title,
        amount: amount,
        date: date
    };

    var addRequest = store.add(expense);

    addRequest.onsuccess = function() {
        alert("Expense Added");
    };

    addRequest.onerror = function(event) {
        alert("Add Error: " + event.target.error);
    };

    transaction.onerror = function(event) {
        alert("Transaction Error: " + event.target.error);
    };
}

// View Expenses
function viewExpenses() {

    var transaction = db.transaction(["expenses"], "readonly");
    var store = transaction.objectStore("expenses");

    var list = document.getElementById("expenseList");
    list.innerHTML = "";

    store.openCursor().onsuccess = function(event) {

        var cursor = event.target.result;

        if (cursor) {

            var li = document.createElement("li");
            li.innerHTML =
                "ID: " + cursor.key +
                " | " + cursor.value.title +
                " | ₹" + cursor.value.amount +
                " | " + cursor.value.date;

            list.appendChild(li);

            cursor.continue();
        }
    };

    transaction.onerror = function(event) {
        alert("Transaction Error: " + event.target.error);
    };
}

// Delete Expense
function deleteExpense() {

    var id = Number(prompt("Enter Expense ID to Delete:"));

    var transaction = db.transaction(["expenses"], "readwrite");
    var store = transaction.objectStore("expenses");

    var deleteRequest = store.delete(id);

    deleteRequest.onsuccess = function() {
        alert("Expense Deleted");
    };

    deleteRequest.onerror = function(event) {
        alert("Delete Error: " + event.target.error);
    };

    transaction.onerror = function(event) {
        alert("Transaction Error: " + event.target.error);
    };
}

</script>

</body>
</html>
