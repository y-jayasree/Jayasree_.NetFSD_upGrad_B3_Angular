<!DOCTYPE html>
<html>
<head>
    <title>Student Feedback Form</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body{
            font-family: Arial;
            background-color: white;
        }
        .container{
            width: 400px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            border-radius: 5px;
        }
        input, select, textarea{
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }
        button{
            padding: 10px;
            width: 100%;
            background-color: blue;
            color: white;
            border: none;
            cursor: pointer;
        }
        .message{
            margin-top: 15px;
            font-weight: bold;
        }
        .error{
            color: red;
        }
        .success{
            color: green;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Student Feedback Form</h2>
    <form id="feedback">
        <input type="text" id="name" placeholder="Enter your Name">
        <input type="email" id="email" placeholder="Enter your Email">
        <select id="rating">
            <option value="">Select Course Rating</option>
            <option>Excellent</option>
            <option>Good</option>
            <option>Average</option>
            <option>Poor</option>
        </select>
        <textarea id="comments" placeholder="Enter your Comments"></textarea>
        <button type="button" id="Btn">Submit</button>
    </form>
    <div class="message"></div>
</div>
<script>
    $(document).ready(function(){

        $("#Btn").click(function(){

            let name = $("#name").val().trim();
            let email = $("#email").val().trim();

            $(".message").removeClass("success error");
            let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if(name === "" || email === ""){
                $(".message")
                    .addClass("error")
                    .text("Please fill in both Name and Email fields.");
            }
            else if(!emailPattern.test(email)){
                $(".message")
                    .addClass("error")
                    .text("Please enter a valid email address.");
            }
            else{
                $(".message")
                    .addClass("success")
                    .text("Thank you! Your feedback submitted successfully.");

                $("#feedback")[0].reset();
            }

        });

    });
</script>

</body>
</html>
